<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Party - Live</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        
        /* הצ'אט הוא הרקע של כל הדף - ככה הוא תמיד מחובר */
        .chat-base {
            position: absolute;
            top: 0;
            right: 0;
            width: 350px; /* רוחב הצ'אט */
            height: 100%;
            z-index: 1;
        }

        /* התוכן שלך (הסרט והמצלמה) צף ליד הצ'אט */
        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 350px; /* משאיר מקום לצ'אט בימין */
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 10;
            background: #000;
            border-left: 2px solid #53fc18;
        }

        .movie-area { flex: 3; border-bottom: 2px solid #333; }
        .camera-area { flex: 1.2; background: #000; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="chat-base">
        <iframe src="https://kick.com/popout/odedsvr/chat"></iframe>
    </div>

    <div class="content-overlay">
        <div class="movie-area">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
        </div>
        <div class="camera-area">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

</body>
</html>
