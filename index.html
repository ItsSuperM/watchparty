<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - Side by Side</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        
        /* חלוקה ל-3 טורים */
        .main-layout { 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
            gap: 2px;
        }

        /* טור 1: הלייב (צד שמאל) */
        .live-sidebar { 
            width: 300px; 
            background: #000;
            border-left: 1px solid #333;
        }

        /* טור 2: הסרט (מרכז - הכי גדול) */
        .movie-center { 
            flex: 1; 
            background: #000;
        }

        /* טור 3: הצ'אט (צד ימין) */
        .chat-sidebar { 
            width: 340px; 
            background: #18181b; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #333;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 12px 20px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="live-sidebar">
        <iframe src="https://player.kick.com/odedsvr"></iframe>
    </div>

    <div class="movie-center">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>

    <div class="chat-sidebar" id="sidebar">
        <div id="ui">
            <p style="color: #53fc18; font-size: 14px; margin-bottom: 10px;">צ'אט OdedSVR</p>
            <button class="btn-kick" onclick="openChat()">הפעל צ'אט</button>
        </div>
    </div>
</div>

<script>
    function openChat() {
        const sidebar = document.getElementById('sidebar');
        const rect = sidebar.getBoundingClientRect();
        
        window.open(
            `https://kick.com/popout/odedsvr/chat`, 
            'KickChat', 
            `width=340,height=${window.innerHeight},left=${window.screenLeft + rect.left},top=${window.screenTop}`
        );

        document.getElementById('ui').innerHTML = '<p style="color: #53fc18;">צ\'אט מחובר</p>';
    }
</script>

</body>
</html>
