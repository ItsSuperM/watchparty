<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - OdedSVR</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        
        .main-layout { display: flex; height: 100vh; width: 100vw; }

        /* הסרט תופס את כל צד שמאל והמרכז */
        .movie-section { 
            flex: 1; 
            background: #000;
        }

        /* סיידבר ימני אחד ללייב ולצ'אט */
        .sidebar { 
            width: 350px; 
            display: flex;
            flex-direction: column;
            background: #18181b;
            border-left: 1px solid #333;
        }

        /* הלייב למעלה - גובה פרופורציונלי ל-350px */
        .live-top { 
            width: 350px;
            height: 197px; 
            background: #000;
            border-bottom: 2px solid #53fc18;
        }

        /* אזור כפתור ההפעלה של הצ'אט */
        .chat-trigger-area { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #101012;
            text-align: center;
            padding: 20px;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 12px 25px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="movie-section">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>

    <div class="sidebar">
        <div class="live-top">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
        
        <div class="chat-trigger-area" id="chat-box">
            <div id="ui">
                <p style="color: #53fc18; font-size: 14px; margin-bottom: 15px;">הלייב מחובר!<br>לחץ להפעלת הצ'אט מתחתיו:</p>
                <button class="btn-kick" onclick="openChat()">הפעל צ'אט</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openChat() {
        const username = 'odedsvr';
        const chatBox = document.getElementById('chat-box');
        const rect = chatBox.getBoundingClientRect();
        
        // פותח את הצ'אט בדיוק מתחת ללייב ובדיוק בגובה שנשאר
        window.open(
            `https://kick.com/popout/${username}/chat`, 
            'KickChatFinal', 
            `width=350,height=${rect.height},left=${window.screenLeft + rect.left},top=${window.screenTop + rect.top}`
        );

        document.getElementById('ui').innerHTML = '<p style="color: #53fc18;">הצ' + 'אט פעיל מתחת ללייב!</p>';
    }
</script>

</body>
</html>
