<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdedSVR - Professional Watch Party</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        .container { display: flex; height: 100vh; width: 100vw; }
        
        /* אזור הסרט */
        .movie-area { flex: 4; background: #000; position: relative; }
        
        /* אזור הסטרימר */
        .sidebar { flex: 1.2; min-width: 350px; display: flex; flex-direction: column; background: #18181b; border-left: 1px solid #2d2d30; }
        
        .camera { height: 30%; background: #000; border-bottom: 2px solid #53fc18; }
        
        /* אזור ה"חור" לצ'אט */
        .chat-placeholder { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #0b0e0f; 
            color: #53fc18;
            text-align: center;
            padding: 20px;
        }

        .kick-btn {
            background: #53fc18;
            color: #000;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 16px;
            box-shadow: 0 0 20px rgba(83, 252, 24, 0.4);
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="movie-area">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>

    <div class="sidebar">
        <div class="camera">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
        
        <div id="chat-box" class="chat-placeholder">
            <div id="setup-ui">
                <h3>הצ'אט של קיק</h3>
                <p>כדי שהצ'אט יעבוד בתוך האתר ללא שגיאות התחברות:</p>
                <button class="kick-btn" onclick="attachChat()">לחץ לחיבור הצ'אט</button>
            </div>
            <p id="status-text" style="display:none; color: #adadb8; font-size: 12px; margin-top: 10px;">
                הצ'אט הוצמד בהצלחה! (אם הוא נעלם, לחץ שוב)
            </p>
        </div>
    </div>
</div>

<script>
    let chatWin = null;

    function attachChat() {
        const username = 'OdedSVR';
        const url = `https://kick.com/popout/${username}/chat`;
        
        // חישוב מיקום מדויק: אנחנו מוצאים איפה ה-Sidebar נמצא על המסך של הצופה
        const chatBox = document.getElementById('chat-box');
        const rect = chatBox.getBoundingClientRect();
        
        // פתיחת חלון חדש בגודל המדויק של ה-Sidebar ובמיקום שלו
        const w = rect.width;
        const h = rect.height;
        const left = window.screenX + rect.left;
        const top = window.screenY + rect.top + (window.outerHeight - window.innerHeight);

        // פתיחת ה"חלון המרחף"
        chatWin = window.open(url, 'KickChatHost', 
            `width=${w},height=${h},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no`
        );

        if (chatWin) {
            document.getElementById('setup-ui').style.opacity = "0.2";
            document.getElementById('status-text').style.display = "block";
            
            // טריק: כשהמשתמש מזיז את החלון הראשי, החלון המרחף עוקב אחריו (אופציונלי)
            window.onbeforeunload = () => chatWin.close();
        } else {
            alert("נא אשר פופ-אפים כדי להציג את הצ'אט!");
        }
    }
</script>

</body>
</html>
