<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - OdedSVR</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        
        /* סידור ראשי: תוכן משמאל, צ'אט מימין */
        .main-layout { 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
        }

        /* אזור הוידאו - תופס את רוב המסך */
        .video-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; /* הסרט מעל הלייב */
            background: #000;
        }

        .movie-part { 
            flex: 2; /* הסרט גדול יותר */
            border-bottom: 2px solid #53fc18; 
        }

        .live-part { 
            flex: 1; /* הלייב מתחתיו */
            background: #000;
        }

        /* אזור הצ'אט - בצד ימין */
        .sidebar-chat { 
            width: 350px; 
            background: #18181b; 
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 15px 25px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;
            box-shadow: 0 0 15px rgba(83, 252, 24, 0.3);
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="video-container">
        <div class="movie-part">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
        </div>
        <div class="live-part">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

    <div class="sidebar-chat" id="sidebar">
        <div id="setup-ui">
            <p style="color: #53fc18; font-weight: bold; margin-bottom: 20px;">הצ'אט של OdedSVR</p>
            <button class="btn-kick" onclick="openChat()">פתח צ'אט מחובר</button>
        </div>
    </div>
</div>

<script>
    function openChat() {
        const username = 'odedsvr';
        const sidebar = document.getElementById('sidebar');
        const rect = sidebar.getBoundingClientRect();
        
        // פתיחת הצ'אט בדיוק מעל הסיידבר
        window.open(
            `https://kick.com/popout/${username}/chat`, 
            'KickChat', 
            `width=350,height=${window.innerHeight},left=${window.screenLeft + rect.left},top=${window.screenTop}`
        );

        document.getElementById('setup-ui').innerHTML = 
            '<p style="color: #53fc18;">הצ\'אט פעיל!</p><p style="color:#666; font-size:12px;">הוא יושב בדיוק כאן.</p>';
    }
</script>

</body>
</html>
