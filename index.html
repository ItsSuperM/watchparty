<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - Perfect Layout</title>
    <style>
        /* צבע הרקע האפור המדויק של WatchParty */
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: #2d2d2d; 
            font-family: sans-serif; 
        }
        
        .main-layout { display: flex; height: 100vh; width: 100vw; }

        /* הסרט בצד שמאל - הכי גדול */
        .movie-section { flex: 1; background: #000; }

        /* סיידבר ימני בשורה נפרדת */
        .sidebar { 
            width: 350px; 
            display: flex;
            flex-direction: column;
            background: #2d2d2d; /* רקע אפור */
            border-left: 1px solid #444;
        }

        /* החלק של הלייב - עם הסוואה אפורה */
        .live-wrapper { 
            width: 100%;
            height: 250px; /* גובה קצת יותר גדול מהלייב */
            background: #2d2d2d; /* כאן האפור מחליף את השחור */
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #53fc18;
        }

        .live-content {
            width: 100%;
            height: 197px; /* יחס 16:9 מושלם */
        }

        /* החלק של הצ'אט - מתחת ללייב */
        .chat-container { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2d2d2d;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 12px 25px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="movie-section">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>

    <div class="sidebar">
        <div class="live-wrapper">
            <div class="live-content">
                <iframe src="https://player.kick.com/odedsvr"></iframe>
            </div>
        </div>
        
        <div class="chat-container" id="chat-anchor">
            <div id="ui">
                <button class="btn-kick" onclick="openChat()">פתח צ'אט מחובר</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openChat() {
        const username = 'odedsvr';
        const anchor = document.getElementById('chat-anchor');
        const rect = anchor.getBoundingClientRect();
        
        // פותח את הצ'אט בדיוק מתחת ללייב
        window.open(
            `https://kick.com/popout/${username}/chat`, 
            'KickChatFinal', 
            `width=350,height=${rect.height},left=${window.screenLeft + rect.left},top=${window.screenTop + rect.top}`
        );

        document.getElementById('ui').innerHTML = '<p style="color: #53fc18;">הצ\'אט משולב!</p>';
    }
</script>

</body>
</html>
