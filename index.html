<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OdedSVR - One Screen Solution</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; }
        .container { display: flex; height: 100vh; width: 100vw; }
        
        /* צד שמאל: סרט ומצלמה */
        .main-content { flex: 4; display: flex; flex-direction: column; background: #000; }
        .movie-area { flex: 3; border-bottom: 2px solid #53fc18; }
        .camera-area { flex: 1.2; background: #000; }

        /* צד ימין: הצ'אט המיוחד */
        .sidebar { flex: 1.2; min-width: 320px; background: #18181b; display: flex; flex-direction: column; border-left: 1px solid #333; }
        
        /* שימוש בגרסה ה"קלה" של קיק שמיועדת לאפליקציות צד שלישי */
        .chat-iframe { flex: 1; width: 100%; height: 100%; border: none; }
        
        .fix-button {
            background: #53fc18;
            color: #000;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-content">
        <div class="movie-area">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
        </div>
        <div class="camera-area">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

    <div class="sidebar">
        <a href="https://kick.com/login" target="login-flow" 
           onclick="window.open('https://kick.com/login', 'login-flow', 'width=400,height=600'); return false;" 
           class="fix-button">
           שלב 1: לחץ כאן להתחברות מהירה (פעם אחת)
        </a>
        
        <iframe 
            src="https://kick.com/popout/odedsvr/chat?parent=github.io" 
            class="chat-iframe">
        </iframe>
    </div>
</div>

</body>
</html>
