<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdedSVR - Ultimate Watch Party</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        .container { display: flex; height: 100vh; width: 100vw; }
        
        /* אזור הסרט */
        .movie-area { flex: 4; background: #000; position: relative; }
        
        /* אזור הסטרימר והצ'אט */
        .sidebar { flex: 1.2; min-width: 350px; display: flex; flex-direction: column; background: #18181b; border-left: 2px solid #53fc18; }
        
        .camera { height: 30%; background: #000; border-bottom: 2px solid #333; }
        
        /* אזור הצ'אט המוטמע באמת */
        .chat-container { flex: 1; position: relative; background: #0b0e0f; }

        /* הטריק המלוכלך: אנחנו שמים את הצ'אט בתוך Object במקום Iframe */
        /* ב-2026, דפדפנים לפעמים נותנים ל-Object יותר הרשאות עוגיות */
        .chat-frame { width: 100%; height: 100%; border: none; }

        .overlay-msg {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(83, 252, 24, 0.9);
            color: black;
            padding: 8px;
            border-radius: 5px;
            font-size: 12px;
            text-align: center;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="movie-area">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="sidebar">
        <div class="camera">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
        
        <div class="chat-container">
            <object class="chat-frame" data="https://kick.com/popout/odedsvr/chat"></object>
            
            <div class="overlay-msg">אם הצ'אט מבקש התחברות: התחברו פעם אחת ב-Kick.com בטאב אחר ורעננו.</div>
        </div>
    </div>
</div>

<script>
    // פונקציה שבודקת אם המשתמש מנסה להקליד ומזכירה לו איך להתחבר
    window.addEventListener('message', function(event) {
        if (event.origin !== "https://kick.com") return;
        // כאן אפשר להוסיף לוגיקה אם קיק שולחים הודעות חזרה
    });

    // רענון אוטומטי שקט כדי לשמור על החיבור חי
    setInterval(() => {
        const chat = document.querySelector('.chat-frame');
        const currentData = chat.data;
        chat.data = "";
        chat.data = currentData;
    }, 900000); // כל 15 דקות
</script>

</body>
</html>
