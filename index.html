<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OdedSVR - Precision Watch Party</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        .container { display: flex; height: 100vh; width: 100vw; }
        
        .movie-area { flex: 4; background: #000; position: relative; }
        
        .sidebar { flex: 1.2; min-width: 350px; display: flex; flex-direction: column; background: #18181b; border-left: 1px solid #53fc18; }
        
        .camera { height: 30%; background: #000; border-bottom: 2px solid #333; }
        
        /* אזור המטרה המדויק */
        #chat-target { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #0b0e0f; 
            color: #53fc18;
            text-align: center;
            border: 2px dashed #2d2d30;
            margin: 5px;
            border-radius: 5px;
        }

        .connect-btn {
            background: #53fc18;
            color: #000;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 15px rgba(83, 252, 24, 0.2);
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="movie-area">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>

    <div class="sidebar">
        <div class="camera">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
        
        <div id="chat-target">
            <h3 style="margin-bottom:5px;">צ'אט קיק</h3>
            <button class="connect-btn" onclick="openPrecisionChat()">הצמד צ'אט למסך</button>
            <p style="color: #666; font-size: 10px; margin-top: 10px;">מומלץ לא להזיז את החלון לאחר החיבור.</p>
        </div>
    </div>
</div>

<script>
    function openPrecisionChat() {
        const username = 'OdedSVR';
        const url = `https://kick.com/popout/${username}/chat`;
        
        const target = document.getElementById('chat-target');
        const rect = target.getBoundingClientRect();
        
        // חישוב הסטייה של מסגרת הדפדפן (Browser Chrome Offset)
        const borderLeft = window.screenLeft || window.screenX;
        const borderTop = window.screenTop || window.screenY;
        
        // חישוב עובי סרגל הכלים העליון של הדפדפן
        const browserToolbarHeight = window.outerHeight - window.innerHeight;
        
        // מיקומי הפיקסלים המדויקים
        const winWidth = rect.width;
        const winHeight = rect.height;
        const winLeft = borderLeft + rect.left;
        const winTop = borderTop + rect.top + browserToolbarHeight;

        const win = window.open(url, 'KickChat', 
            `width=${winWidth},height=${winHeight},left=${winLeft},top=${winTop},menubar=no,toolbar=no,location=no,status=no,resizable=yes`
        );

        if (win) {
            // עיצוב מחדש של האזור לאחר החיבור כדי שייראה "נקי"
            target.style.border = "none";
            target.style.background = "#18181b";
            target.innerHTML = "<div style='color:#333; font-size:12px;'>הצ'אט מוצמד.</div>";
            
            // פוקוס חזרה לחלון הראשי כדי שהסרט ימשיך לרוץ
            window.focus();
        } else {
            alert("נא לאשר פופ-אפים בדפדפן.");
        }
    }
</script>

</body>
</html>
