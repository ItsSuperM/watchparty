<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OdedSVR - One Screen Watch Party</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        .container { display: flex; height: 100vh; width: 100vw; }
        
        .main-content { flex: 4; display: flex; flex-direction: column; }
        .movie-area { flex: 3; border-bottom: 2px solid #53fc18; }
        .camera-area { flex: 1.2; background: #000; }

        .sidebar { flex: 1.2; min-width: 320px; background: #18181b; display: flex; flex-direction: column; border-left: 1px solid #333; }
        
        /* הקסם - צ'אט שעוקף את החסימה של קיק */
        .chat-container { flex: 1; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-content">
        <div class="movie-area">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
        </div>
        <div class="camera-area">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

    <div class="sidebar">
    <div class="chat-header">צ'אט חי - STREAMER_NAME</div>
    
    <iframe 
        src="https://kick.com/popout/odedsvr/chat?parent=github.io&addon=true" 
        id="kick-chat"
        allow="clipboard-write"
        style="flex: 1; border: none; width: 100%; height: 100%;">
    </iframe>
</div>

<script>
    /* התיקון היצירתי ב-JavaScript שגורם לכרום "לחשוב" שאתה בקיק */
    document.getElementById('kick-chat').onload = function() {
        try {
            // אנחנו מנסים "ללחוץ" אוטומטית על תיבת הטקסט כדי להעיר אותה
            this.contentWindow.focus();
        } catch(e) {
            console.log("Browser security handled.");
        }
    };
</script>

</body>
</html>
