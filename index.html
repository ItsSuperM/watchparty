<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Watch Party - OdedSVR</title>
    <script src="https://bundle.run/pusher-js@8.4.0-rc2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #2d2d2d; font-family: sans-serif; }
        .layout { display: flex; height: 100vh; width: 100vw; flex-direction: row-reverse; } /* צ'אט בימין */
        
        .movie-area { flex: 1; background: #000; position: relative; }
        
        .sidebar { 
            width: 350px; 
            display: flex; 
            flex-direction: column; 
            background: #18181b; 
            border-right: 1px solid #444; 
        }

        .live-container { 
            width: 100%; 
            height: 197px; 
            background: #2d2d2d; 
            border-bottom: 2px solid #53fc18;
        }

        #chat-display {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            color: #efeff1;
            font-size: 14px;
            background: #0e0e10;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .msg { border-bottom: 1px solid #1f1f23; padding-bottom: 4px; line-height: 1.4; }
        .user { font-weight: bold; color: #53fc18; margin-left: 5px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <div class="live-container">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
        <div id="chat-display">מנסה להתחבר לצ'אט...</div>
    </div>

    <div class="movie-area">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>
</div>

<script>
    // הגדרות חיבור ל-Kick
    const PUSHER_KEY = 'eb1d5f2830865360980d';
    const CHAT_ID = '2443015'; // ה-ID המעודכן של עודד

    try {
        const pusher = new Pusher(PUSHER_KEY, {
            cluster: 'us2',
            forceTLS: true
        });

        const channel = pusher.subscribe(`chatrooms.${CHAT_ID}.v2`);
        const chatBox = document.getElementById('chat-display');

        channel.bind('App\\Events\\ChatMessageEvent', function(data) {
            if (chatBox.innerText.includes('מנסה להתחבר')) chatBox.innerHTML = '';
            
            const div = document.createElement('div');
            div.className = 'msg';
            const color = data.sender.identity.color || '#53fc18';
            
            div.innerHTML = `<span class="user" style="color:${color}">${data.sender.username}:</span> <span>${data.content}</span>`;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // הודעה אם החיבור הצליח
        pusher.connection.bind('connected', () => {
            chatBox.innerHTML = '<div style="color:#53fc18; text-align:center;">מחובר לצ\'אט של עודד!</div>';
        });

    } catch (e) {
        document.getElementById('chat-display').innerHTML = 'שגיאה בחיבור לצ\'אט. נסה לרענן.';
    }
</script>

</body>
</html>
