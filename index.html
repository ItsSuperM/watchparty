<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - OdedSVR</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; }
        
        .main-wrapper { 
            display: flex; height: 100vh; width: 100vw; 
        }

        .content-area { flex: 1; display: flex; flex-direction: column; background: #000; }
        .movie-box { flex: 3; border-bottom: 2px solid #53fc18; }
        .camera-box { flex: 1.2; background: #000; }

        .activation-sidebar { 
            width: 350px; background: #18181b; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            border-left: 1px solid #333; padding: 20px; text-align: center;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 15px 25px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;
            box-shadow: 0 0 15px rgba(83, 252, 24, 0.3);
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-wrapper" id="layout-wrapper">
    <div class="content-area">
        <div class="movie-box">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
        </div>
        <div class="camera-box">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

    <div class="activation-sidebar" id="side-setup">
        <p style="color: #53fc18; font-weight: bold; margin-bottom: 20px;">הצ'אט של OdedSVR</p>
        <button class="btn-kick" onclick="openPerfectChat()">הפעל צ'אט מחובר</button>
        <p style="color: #666; font-size: 11px; margin-top: 15px;">הצ'אט ייפתח בדיוק כאן ולא יסתיר את הסרט.</p>
    </div>
</div>

<script>
    function openPerfectChat() {
        const username = 'odedsvr'; // השם של הסטרימר
        
        const sidebar = document.getElementById('side-setup');
        const rect = sidebar.getBoundingClientRect();
        
        // פתיחת החלון במיקום המדויק של הסיידבר
        window.open(
            `https://kick.com/popout/${username}/chat`, 
            'KickChat', 
            `width=350,height=${window.innerHeight},left=${window.screenLeft + rect.left},top=${window.screenTop}`
        );

        // תיקון המירכאות שהפילו את הקוד הקודם
        sidebar.innerHTML = '<p style="color: #53fc18; font-weight: bold;">הצ' + 'אט פעיל!</p><p style="color:#666; font-size:12px;">החלון נפתח בדיוק כאן. אם הוא מסתיר, אפשר להזיז אותו.</p>';
    }
</script>

</body>
</html>
