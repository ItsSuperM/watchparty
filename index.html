<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - OdedSVR Custom</title>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #2d2d2d; font-family: 'Segoe UI', Arial, sans-serif; }
        
        .layout { display: flex; height: 100vh; width: 100vw; }

        /* הסרט - צד שמאל */
        .movie-box { flex: 1; background: #000; }

        /* סיידבר ימני */
        .sidebar { 
            width: 350px; 
            display: flex;
            flex-direction: column;
            background: #2d2d2d; 
            border-left: 1px solid #444;
        }

        /* הלייב - מוטמע בתוך רקע אפור */
        .live-box { 
            width: 100%;
            height: 220px; 
            background: #2d2d2d; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #53fc18;
        }

        .live-embed { width: 100%; height: 197px; }

        /* צ'אט מותאם אישית (Native) */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #101113; /* צבע כהה מקצועי לצ'אט */
            color: white;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-line { line-height: 1.5; word-wrap: break-word; }
        .username { font-weight: bold; color: #53fc18; margin-left: 6px; }
        .content { color: #e1e1e1; }
        
        /* עיצוב פס גלילה */
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #53fc18; border-radius: 10px; }
    </style>
</head>
<body>

<div class="layout">
    <div class="movie-box">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>

    <div class="sidebar">
        <div class="live-box">
            <div class="live-embed">
                <iframe src="https://player.kick.com/odedsvr"></iframe>
            </div>
        </div>
        
        <div id="chat-window">
            <div style="color: #666; text-align: center; margin-top: 20px;">מתחבר לצ'אט של עודד...</div>
        </div>
    </div>
</div>

<script>
    // חיבור ל-Pusher של Kick
    const pusher = new Pusher('eb1d5f2830865360980d', {
        cluster: 'us2',
        forceTLS: true
    });

    // שימוש ב-ID המדויק של עודד
    const chatRoomId = '2741541'; 
    const channel = pusher.subscribe(`chatrooms.${chatRoomId}.v2`);

    const chatWin = document.getElementById('chat-window');

    channel.bind('App\\Events\\ChatMessageEvent', function(data) {
        // ניקוי הודעת "מתחבר" בהודעה הראשונה
        if (chatWin.innerText.includes('מתחבר')) chatWin.innerHTML = '';

        const div = document.createElement('div');
        div.className = 'msg-line';
        
        // הגדרת צבע המשתמש (אם קיים ב-Kick)
        const userColor = data.sender.identity.color || '#53fc18';
        
        div.innerHTML = `
            <span class="username" style="color: ${userColor}">${data.sender.username}:</span>
            <span class="content">${data.content}</span>
        `;
        
        chatWin.appendChild(div);
        
        // גלילה אוטומטית למטה
        chatWin.scrollTop = chatWin.scrollHeight;
    });
</script>

</body>
</html>
