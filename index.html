<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - Seamless Design</title>
    <style>
        /* שימוש בצבע האפור המדויק של WatchParty */
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: #2d2d2d; /* הצבע האפור של האתר */
            font-family: sans-serif; 
        }
        
        .main-layout { display: flex; height: 100vh; width: 100vw; }

        /* הסרט - צד שמאל */
        .movie-section { flex: 1; background: #000; }

        /* סיידבר ימני שמשתלב עם האתר */
        .sidebar-integrated { 
            width: 350px; 
            display: flex;
            flex-direction: column;
            background: #2d2d2d; /* אותו צבע אפור */
            border-left: 1px solid #444;
        }

        /* הלייב למעלה - עם "הסוואה" אפורה */
        .live-container { 
            width: 350px;
            height: 220px; 
            background: #2d2d2d; /* רקע אפור שמבטל את השחור מסביב ללייב */
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #53fc18; /* קו ירוק עדין של קיק */
        }

        .live-embed {
            width: 100%;
            height: 197px; /* יחס 16:9 */
        }

        /* אזור הצ'אט שמתחת */
        .chat-placeholder { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2d2d2d;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 12px 25px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="movie-section">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>

    <div class="sidebar-integrated">
        <div class="live-container">
            <div class="live-embed">
                <iframe src="https://player.kick.com/odedsvr"></iframe>
            </div>
        </div>
        
        <div class="chat-placeholder" id="chat-anchor">
            <div id="ui">
                <button class="btn-kick" onclick="openChat()">הפעל צ'אט</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openChat() {
        const username = 'odedsvr';
        const anchor = document.getElementById('chat-anchor');
        const rect = anchor.getBoundingClientRect();
        
        // פתיחת הצ'אט בדיוק מתחת ללייב על הרקע האפור
        window.open(
            `https://kick.com/popout/${username}/chat`, 
            'KickChatFinal', 
            `width=350,height=${rect.height},left=${window.screenLeft + rect.left},top=${window.screenTop + rect.top}`
        );

        document.getElementById('ui').innerHTML = '<p style="color: #53fc18;">הצ\'אט משולב בעיצוב!</p>';
    }
</script>

</body>
</html>
