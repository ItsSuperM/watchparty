<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - Final Layout</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        
        .main-layout { display: flex; height: 100vh; width: 100vw; }

        /* הסרט - תופס את כל צד שמאל */
        .movie-section { flex: 1; background: #000; }

        /* סיידבר ימני רחב יותר כדי להכיל גם לייב וגם צ'אט */
        .right-sidebar { 
            width: 600px; /* הגדלנו את הרוחב כדי שיהיה מקום לשניהם */
            display: flex;
            background: #18181b;
            border-left: 1px solid #333;
        }

        /* חלק הלייב בתוך הסיידבר */
        .live-column { 
            width: 300px; 
            border-left: 1px solid #333;
            background: #000;
        }

        /* חלק הצ'אט בתוך הסיידבר */
        .chat-column { 
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #101012;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 12px 20px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="movie-section">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>

    <div class="right-sidebar">
        <div class="live-column">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
        
        <div class="chat-column" id="chat-anchor">
            <div id="ui">
                <button class="btn-kick" onclick="openChat()">פתח צ'אט</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openChat() {
        const username = 'odedsvr';
        const anchor = document.getElementById('chat-anchor');
        const rect = anchor.getBoundingClientRect();
        
        // פותח את הצ'אט על כל הגובה (כדי שלא יתכווץ כמו בתמונה)
        window.open(
            `https://kick.com/popout/${username}/chat`, 
            'KickChatFinal', 
            `width=340,height=${window.innerHeight},left=${window.screenLeft + rect.left},top=${window.screenTop}`
        );

        document.getElementById('ui').innerHTML = '<p style="color: #53fc18;">צ\'אט פעיל!</p>';
    }
</script>

</body>
</html>
