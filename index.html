<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OdedSVR - הכל במקום אחד</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        .wrapper { display: flex; width: 100vw; height: 100vh; }

        /* אזור הסרט והמצלמה - צד שמאל */
        .content-left {
            flex: 3;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .movie-box { height: 70%; background: #000; position: relative; }
        .camera-box { height: 30%; background: #000; border-top: 2px solid #53fc18; }

        /* אזור הצ'אט - צד ימין */
        .chat-right {
            flex: 1.2;
            min-width: 350px;
            background: #18181b;
            position: relative;
        }

        /* כאן הקסם: אנחנו משתמשים ב-URL של הצ'אט המלא, לא ה-Popout! */
        /* זה גורם לכרום לחשוב שזה דף רגיל ולא מסגרת כלואה */
        .secure-chat {
            width: 100%;
            height: 100%;
            border: none;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="content-left">
        <div class="movie-box">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
        </div>
        <div class="camera-box">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

    <div class="chat-right">
        <iframe 
            src="https://kick.com/odedsvr/chat" 
            class="secure-chat"
            allow="clipboard-write"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
        ></iframe>
    </div>
</div>

</body>
</html>
