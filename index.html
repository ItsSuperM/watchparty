<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - OdedSVR</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        
        /* חלוקת המסך לתוכן (שמאל) וסיידבר לצ'אט (ימין) */
        .main-container { 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
        }

        /* אזור הוידאו - מחולק לסרט ולייב אחד מעל השני */
        .video-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #000;
        }

        .movie-box { 
            flex: 2; /* הסרט מקבל יותר שטח */
            border-bottom: 2px solid #53fc18; 
        }

        .live-box { 
            flex: 1; /* הלייב למטה */
            background: #000;
        }

        /* אזור הצ'אט הקבוע */
        .chat-sidebar { 
            width: 350px; 
            background: #18181b; 
            display: flex; 
            flex-direction: column; 
            border-left: 1px solid #333;
            text-align: center;
        }

        .setup-area {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 15px 25px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="video-section">
        <div class="movie-box">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
        </div>
        <div class="live-box">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

    <div class="chat-sidebar" id="sidebar">
        <div class="setup-area" id="setup-content">
            <p style="color: #53fc18; font-weight: bold; margin-bottom: 20px;">הצ'אט של OdedSVR</p>
            <button class="btn-kick" onclick="openChat()">הפעל צ'אט</button>
            <p style="color: #666; font-size: 11px; margin-top: 15px;">הצ'אט ייפתח בדיוק כאן.</p>
        </div>
    </div>
</div>

<script>
    function openChat() {
        const username = 'odedsvr';
        const sidebar = document.getElementById('sidebar');
        const rect = sidebar.getBoundingClientRect();
        
        // פתיחת הצ'אט במיקום המדויק של הסיידבר
        window.open(
            `https://kick.com/popout/${username}/chat`, 
            'KickChat', 
            `width=350,height=${window.innerHeight},left=${window.screenLeft + rect.left},top=${window.screenTop}`
        );

        document.getElementById('setup-content').innerHTML = 
            '<p style="color: #53fc18; margin-top: 50px;">הצ\'אט פעיל!</p><p style="color:#666; font-size:12px;">אם החלון זז, גרור אותו חזרה לכאן.</p>';
    }
</script>

</body>
</html>
