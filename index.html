<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Kick Watch Party Interface</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #2d2d2d; font-family: sans-serif; }
        
        /* סידור המסך: הסרט משמאל, הסיידבר מימין */
        .main-container { display: flex; height: 100vh; width: 100vw; flex-direction: row-reverse; }

        /* הסרט - WatchParty */
        .video-main { flex: 1; background: #000; }

        /* סיידבר ימני (לייב + צ'אט) */
        .sidebar { 
            width: 350px; 
            display: flex; 
            flex-direction: column; 
            background: #18181b; 
            border-left: 1px solid #444; 
        }

        /* אזור הלייב העליון - רקע אפור כדי להעלים את השחור */
        .live-top-section { 
            width: 100%; 
            height: 220px; 
            background: #2d2d2d; /* הצבע האפור של האתר שביקשת */
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-bottom: 2px solid #53fc18;
        }

        .live-iframe-holder { width: 100%; height: 197px; }

        /* אזור הצ'אט התחתון - שימוש ב-Embed רשמי */
        .chat-bottom-section { flex: 1; background: #0b0e0f; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="sidebar">
        <div class="live-top-section">
            <div class="live-iframe-holder">
                <iframe src="https://player.kick.com/odedsvr"></iframe>
            </div>
        </div>
        
        <div class="chat-bottom-section">
            <iframe src="https://kick.com/popout/odedsvr/chat"></iframe>
        </div>
    </div>

    <div class="video-main">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>
</div>

</body>
</html>
