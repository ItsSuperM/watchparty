<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OdedSVR - One Link Live</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        .container { display: flex; height: 100vh; width: 100vw; }
        
        /* אזור הסרט והמצלמה */
        .main-content { flex: 3.5; display: flex; flex-direction: column; background: #000; }
        .movie-area { flex: 2.5; position: relative; border-bottom: 2px solid #53fc18; }
        .camera-area { flex: 1; background: #000; }

        /* אזור הצ'אט - המעקף המנצח */
        .sidebar { flex: 1.2; min-width: 320px; background: #18181b; border-left: 1px solid #333; display: flex; flex-direction: column; }
        
        /* הכותרת של הצ'אט */
        .chat-header { background: #18181b; color: #53fc18; padding: 10px; text-align: center; font-weight: bold; font-size: 14px; border-bottom: 1px solid #2d2d30; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-content">
        <div class="movie-area">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="camera-area">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

    <div class="sidebar">
        <div class="chat-header">הצ'אט של STREAMER_NAME</div>
        
        <iframe 
            src="https://kick.com/m/odedsvr/chat" 
            allow="clipboard-write"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
        ></iframe>
    </div>
</div>

</body>
</html>
