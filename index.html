<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - No Black Bars</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        
        .main-layout { display: flex; height: 100vh; width: 100vw; }

        /* הסרט - תופס את כל צד שמאל */
        .movie-section { flex: 1; background: #000; }

        /* סיידבר ימני רחב - מכיל את הלייב והצ'אט אחד ליד השני */
        .dual-sidebar { 
            width: 700px; /* רוחב מספיק לשני טורים של 350px */
            display: flex;
            background: #18181b;
            border-left: 2px solid #53fc18;
        }

        /* טור הלייב - מחושב לפי יחס 16:9 */
        .live-column { 
            width: 350px;
            display: flex;
            align-items: center; /* ממרכז את הוידאו אנכית כדי שלא ימתח */
            background: #000;
            border-left: 1px solid #333;
        }

        .live-container {
            width: 100%;
            height: 197px; /* חישוב: 350 חלקי 1.77 */
        }

        /* טור הצ'אט */
        .chat-column { 
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #101012;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 12px 25px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="movie-section">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>

    <div class="dual-sidebar">
        <div class="live-column">
            <div class="live-container">
                <iframe src="https://player.kick.com/odedsvr"></iframe>
            </div>
        </div>
        
        <div class="chat-column" id="chat-anchor">
            <div id="ui">
                <button class="btn-kick" onclick="openChat()">הפעל צ'אט</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openChat() {
        const username = 'odedsvr';
        const anchor = document.getElementById('chat-anchor');
        const rect = anchor.getBoundingClientRect();
        
        // פותח את הצ'אט על כל הגובה כדי למנוע את ה"מעיכה" שראינו בתמונות
        window.open(
            `https://kick.com/popout/${username}/chat`, 
            'KickChatFinal', 
            `width=350,height=${window.innerHeight},left=${window.screenLeft + rect.left},top=${window.screenTop}`
        );

        document.getElementById('ui').innerHTML = '<p style="color: #53fc18; font-weight: bold;">הצ\'אט פעיל בטור הימני!</p>';
    }
</script>

</body>
</html>
