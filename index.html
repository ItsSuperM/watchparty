<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - Perfect Fit</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; transition: margin-right 0.3s ease; }
        
        /* המכולה הראשית של האתר שלך */
        .main-wrapper { 
            display: flex; height: 100vh; width: 100vw; 
            transition: width 0.3s ease; 
        }

        .content-area { flex: 1; display: flex; flex-direction: column; background: #000; }
        .movie-box { flex: 3; border-bottom: 2px solid #53fc18; }
        .camera-box { flex: 1.2; background: #000; }

        /* כפתור הפעלה מעוצב */
        .activation-sidebar { 
            width: 350px; background: #18181b; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            border-left: 1px solid #333; padding: 20px; text-align: center;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 15px 25px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-wrapper" id="layout-wrapper">
    <div class="content-area">
        <div class="movie-box">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
        </div>
        <div class="camera-box">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

    <div class="activation-sidebar" id="side-setup">
        <p style="color: #53fc18; font-weight: bold; margin-bottom: 20px;">הצ'אט של STREAMER_NAME</p>
        <button class="btn-kick" onclick="openPerfectChat()">הפעל צ'אט (בלי להסתיר)</button>
        <p style="color: #666; font-size: 11px; margin-top: 15px;">הצ'אט ייפתח בחלון נפרד שימוקם בדיוק כאן.</p>
    </div>
</div>

<script>
    function openPerfectChat() {
        const username = 'OdedSVR';
        
        // 1. חישוב המיקום המדויק של הסיידבר על המסך
        const sidebar = document.getElementById('side-setup');
        const rect = sidebar.getBoundingClientRect();
        
        // 2. פתיחת הצ'אט במיקום המדויק של הסיידבר
        // זה פותח את החלון בדיוק מעל האזור האפור, ככה שזה לא מסתיר את הסרט!
        window.open(
            `https://kick.com/popout/${username}/chat`, 
            'KickChat', 
            `width=350,height=${window.innerHeight},left=${window.screenLeft + rect.left},top=${window.screenTop}`
        );

        // 3. שינוי המראה של הסיידבר כדי שידעו שזה פעיל
        sidebar.innerHTML = '<p style="color: #53fc18;">הצ'אט פעיל!<br><span style="color:#666; font-size:12px;">אם הוא זז, פשוט גרור אותו חזרה לכאן.</span></p>';
    }
</script>

</body>
</html>
