<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OdedSVR - Watch Party Alpha</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        
        /* השכבה של הסרט והמצלמה - צפה מעל הצ'אט */
        .overlay-content {
            position: absolute;
            top: 0;
            left: 350px; /* משאיר מקום לצ'אט בצד שמאל/ימין */
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            z-index: 10;
            background: #000;
            border-right: 2px solid #53fc18;
        }

        .movie-area { flex: 3; border-bottom: 2px solid #333; }
        .camera-area { flex: 1.2; background: #000; }

        /* הצ'אט המקורי שתופס את כל הרקע */
        .chat-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 350px;
            height: 100%;
            z-index: 1;
        }

        iframe { width: 100%; height: 100%; border: none; }
        
        .login-helper {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 20;
            background: #53fc18;
            color: #000;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 3px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="chat-background">
        <iframe src="https://kick.com/popout/odedsvr/chat"></iframe>
    </div>

    <div class="overlay-content">
        <div class="movie-area">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
        </div>
        <div class="camera-area">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

    <a href="https://kick.com/login" target="_blank" class="login-helper">לא מחוברים? לחצו כאן</a>

</body>
</html>
