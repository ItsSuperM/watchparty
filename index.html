<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K0nkaMc - Watch Party</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        .container { display: flex; height: 100vh; width: 100vw; }
        
        /* אזור הסרט - תופס את רוב המסך */
        .movie-area { flex: 4; background: #111; position: relative; }
        
        /* אזור הצד - מצלמה וצ'אט */
        .sidebar { flex: 1; display: flex; flex-direction: column; border-left: 2px solid #53fc18; } /* ירוק של קיק */
        
        .camera { height: 30%; background: #000; }
        .chat { height: 70%; background: #18181b; }
        
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="movie-area">
        <iframe src="https://www.watchparty.me/YOUR_ROOM_ID" allowfullscreen></iframe>
    </div>

    <div class="sidebar">
        <div class="camera">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
        
        <div class="chat">
            <iframe src="https://kick.com/popout/odedsvr/chat"></iframe>
        </div>
    </div>
</div>

</body>
</html>
