<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OdedSVR - One Link Solution</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; color: white; font-family: sans-serif; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .main-content { flex: 4; display: flex; flex-direction: column; }
        .movie-area { flex: 3; border-bottom: 2px solid #53fc18; background: #000; }
        .camera-area { flex: 1.2; background: #000; }
        .sidebar { flex: 1.2; min-width: 320px; background: #18181b; display: flex; flex-direction: column; border-left: 1px solid #333; }
        
        /* אזור הצ'אט */
        #chat-wrapper { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* הודעת הסנכרון הקטנה */
        .sync-bar {
            background: #53fc18; color: #000; padding: 5px; text-align: center;
            font-size: 12px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-content">
        <div class="movie-area">
            <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
        </div>
        <div class="camera-area">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
    </div>

    <div class="sidebar">
        <div class="sync-bar" onclick="quickSync()">
            לחץ כאן פעם אחת להפעלת הצ'אט
        </div>
        <div id="chat-wrapper">
            <iframe id="kick-chat" src="https://kick.com/popout/odedsvr/chat"></iframe>
        </div>
    </div>
</div>

<script>
    function quickSync() {
        // פותח חלון קטן מאוד וסוגר אותו אחרי 2 שניות
        // זה גורם לכרום להעביר את העוגיות לתוך ה-iframe באופן זמני
        const syncWin = window.open('https://kick.com/popout/odedsvr/chat', 'Sync', 'width=100,height=100,left=-1000,top=-1000');
        
        const bar = document.querySelector('.sync-bar');
        bar.innerHTML = "מסנכרן... מיד מסיימים";
        bar.style.background = "#ffb300";

        setTimeout(() => {
            if (syncWin) syncWin.close();
            // מרענן רק את ה-iframe של הצ'אט
            document.getElementById('kick-chat').src = document.getElementById('kick-chat').src;
            bar.innerHTML = "הצ'אט מחובר! תהנו";
            bar.style.background = "#53fc18";
            setTimeout(() => { bar.style.display = 'none'; }, 3000);
        }, 3000);
    }
</script>

</body>
</html>
