<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Stream Watch Party - Fixed Sidebar</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0e0f; font-family: sans-serif; }
        
        .main-layout { display: flex; height: 100vh; width: 100vw; }

        /* הסרט בצד שמאל - תופס הכל */
        .movie-section { flex: 1; background: #000; }

        /* עמודה ימנית קבועה */
        .right-sidebar { 
            width: 350px; 
            display: flex;
            flex-direction: column;
            background: #18181b;
            border-left: 1px solid #333;
        }

        /* הלייב למעלה - גובה מחושב לפי רוחב 350px */
        .live-top { 
            width: 350px;
            height: 197px; /* יחס 16:9 מושלם ללייב */
            background: #000;
            border-bottom: 2px solid #53fc18;
        }

        /* האזור שמתחת ללייב לצ'אט */
        .chat-area-placeholder { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #101012;
        }

        .btn-kick {
            background: #53fc18; color: #000; padding: 12px 20px; border: none;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="movie-section">
        <iframe src="https://www.watchparty.me/watch/puffy-expansion-withdraw" allowfullscreen></iframe>
    </div>

    <div class="right-sidebar">
        <div class="live-top" id="live-area">
            <iframe src="https://player.kick.com/odedsvr"></iframe>
        </div>
        
        <div class="chat-area-placeholder" id="chat-anchor">
            <div id="ui">
                <button class="btn-kick" onclick="openChat()">פתח צ'אט במידה הנכונה</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openChat() {
        const username = 'odedsvr';
        const anchor = document.getElementById('chat-anchor');
        const rect = anchor.getBoundingClientRect();
        
        // הוספתי Math.floor כדי שהמספרים יהיו שלמים
        const w = 350;
        const h = Math.floor(rect.height);
        const l = Math.floor(window.screenLeft + rect.left);
        const t = Math.floor(window.screenTop + rect.top);

        // שינוי שם החלון ל-'KickChatFixed' כדי שהדפדפן לא ימחזר הגדרות ישנות
        const chatWin = window.open(
            `https://kick.com/popout/${username}/chat`, 
            'KickChatFixed', 
            `width=${w},height=${h},left=${l},top=${t},menubar=no,toolbar=no,location=no`
        );

        // כפיית גודל ליתר ביטחון אם הדפדפן מתעלם מה-Popup settings
        if (chatWin) {
            chatWin.resizeTo(w, h);
            chatWin.moveTo(l, t);
        }

        document.getElementById('ui').innerHTML = '<p style="color: #53fc18;">הצ' + 'אט נפתח מתחת ללייב!</p>';
    }
</script>

</body>
</html>
